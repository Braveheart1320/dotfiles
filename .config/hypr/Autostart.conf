#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:


exec-once = [workspace 1; float; move 801 97; size 1025 500] kitty -e --hold fastfetch -c groups
exec-once = [workspace 1; float; move 1598 600; size 645 535] kitty -e --hold fastfetch -c hypr
exec-once = [workspace 1; float; move 340 600; size 1255 780] kitty -e --hold fastfetch -c full-info
#exec-once = [workspace 2; silent] spotify
#exec-once = [workspace 2; silent] discord
exec-once = waybar
exec-once = waypaper --wallpaper ~/.config/waypaper/Wallpapers/kcd2-shepherd-wallpaper-fullhd.jpg --monitor HDMI-A-1 & waypaper --wallpaper ~/.config/waypaper/Wallpapers/kcd2_re_desktop_3840x2160.jpg --monitor DP-1 --backend awww 
